<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .navbar { background: rgba(0,0,0,0.3) !important; }
        .card {
            border: none;
            border-radius: 15px;
            animation: fadeInUp 0.6s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .btn-main {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            transition: all 0.3s ease;
        }
        .btn-main:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .user-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }
        .user-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">🔐 Cognifyz Auth App</a>
            <button id="logoutBtn" class="btn btn-outline-light btn-sm d-none" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container py-5">

        <!-- Auth Pages -->
        <div id="authSection">
            <div class="row justify-content-center">
                <div class="col-md-5">

                    <!-- Login Page -->
                    <div class="page active" id="loginPage">
                        <div class="card shadow-lg p-4">
                            <h4 class="fw-bold mb-4 text-center" style="color:#667eea">Login</h4>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Email</label>
                                <input type="email" id="loginEmail" class="form-control" placeholder="Enter email" />
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Password</label>
                                <input type="password" id="loginPassword" class="form-control" placeholder="Enter password" />
                            </div>
                            <button class="btn btn-main text-white w-100 py-2 fw-bold" onclick="login()">Login 🚀</button>
                            <div id="loginMessage" class="mt-3"></div>
                            <p class="text-center mt-3 mb-0">Don't have an account? 
                                <a href="#" onclick="showPage('registerPage')" style="color:#667eea">Register</a>
                            </p>
                        </div>
                    </div>

                    <!-- Register Page -->
                    <div class="page" id="registerPage">
                        <div class="card shadow-lg p-4">
                            <h4 class="fw-bold mb-4 text-center" style="color:#667eea">Register</h4>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Full Name</label>
                                <input type="text" id="regName" class="form-control" placeholder="Enter name" />
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Email</label>
                                <input type="email" id="regEmail" class="form-control" placeholder="Enter email" />
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Password</label>
                                <input type="password" id="regPassword" class="form-control" placeholder="Min 6 characters" />
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Phone</label>
                                <input type="tel" id="regPhone" class="form-control" placeholder="Enter phone" />
                            </div>
                            <button class="btn btn-main text-white w-100 py-2 fw-bold" onclick="register()">Register 🚀</button>
                            <div id="registerMessage" class="mt-3"></div>
                            <p class="text-center mt-3 mb-0">Already have an account?
                                <a href="#" onclick="showPage('loginPage')" style="color:#667eea">Login</a>
                            </p>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <!-- Dashboard - shown after login -->
        <div id="dashboardSection" class="d-none">
            <div class="card shadow-lg p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold mb-0" style="color:#667eea">👋 Welcome, <span id="welcomeName"></span>!</h4>
                    <button class="btn btn-main text-white btn-sm" onclick="fetchUsers()">🔄 Refresh</button>
                </div>
                <h5 class="fw-bold mb-3">All Registered Users</h5>
                <div id="usersList">
                    <p class="text-muted">Loading users...</p>
                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API = 'http://localhost:3000/api';
        let token = localStorage.getItem('token');

        // Check if already logged in
        if (token) showDashboard();

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        // Register
        async function register() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const phone = document.getElementById('regPhone').value.trim();
            const msg = document.getElementById('registerMessage');

            if (!name || !email || !password || !phone) {
                msg.innerHTML = '<div class="alert alert-danger">⚠️ All fields are required</div>';
                return;
            }

            const res = await fetch(`${API}/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password, phone })
            });

            const data = await res.json();

            if (res.ok) {
                msg.innerHTML = '<div class="alert alert-success">✅ Registration successful! Please login.</div>';
                setTimeout(() => showPage('loginPage'), 2000);
            } else {
                msg.innerHTML = `<div class="alert alert-danger">⚠️ ${data.message}</div>`;
            }
        }

        // Login
        async function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const msg = document.getElementById('loginMessage');

            const res = await fetch(`${API}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();

            if (res.ok) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('userName', data.user.name);
                token = data.token;
                showDashboard();
            } else {
                msg.innerHTML = `<div class="alert alert-danger">⚠️ ${data.message}</div>`;
            }
        }

        // Show dashboard
        function showDashboard() {
            document.getElementById('authSection').classList.add('d-none');
            document.getElementById('dashboardSection').classList.remove('d-none');
            document.getElementById('logoutBtn').classList.remove('d-none');
            document.getElementById('welcomeName').textContent = localStorage.getItem('userName');
            fetchUsers();
        }

        // Fetch users
        async function fetchUsers() {
            const res = await fetch(`${API}/users`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            const users = await res.json();
            const list = document.getElementById('usersList');

            if (users.length === 0) {
                list.innerHTML = '<p class="text-muted">No users found.</p>';
                return;
            }

            list.innerHTML = users.map(user => `
                <div class="user-card">
                    <h6 class="fw-bold mb-1">👤 ${user.name}</h6>
                    <p class="mb-0 text-muted small">📧 ${user.email} | 📱 ${user.phone}</p>
                </div>
            `).join('');
        }

        // Logout
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('userName');
            token = null;
            document.getElementById('authSection').classList.remove('d-none');
            document.getElementById('dashboardSection').classList.add('d-none');
            document.getElementById('logoutBtn').classList.add('d-none');
            showPage('loginPage');
        }
    </script>
</body>
</html>
