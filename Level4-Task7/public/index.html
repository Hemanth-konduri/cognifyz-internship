<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognifyz Task 7</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            border: none;
            border-radius: 15px;
            animation: fadeInUp 0.6s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .btn-google {
            background: white;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 12px;
            font-weight: bold;
            transition: all 0.3s ease;
            color: #333;
        }
        .btn-google:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg p-5 text-center">
                    <h2 class="fw-bold mb-2" style="color:#667eea">🚀 Cognifyz App</h2>
                    <p class="text-muted mb-4">Sign in to access the dashboard</p>
                    <a href="/auth/google" class="btn btn-google w-100">
                        <img src="https://developers.google.com/identity/images/g-logo.png" 
                             width="20" class="me-2">
                        Continue with Google
                    </a>
                    <hr class="my-4">
                    <p class="text-muted small">
                        🔒 Secured with OAuth 2.0<br>
                        ⚡ Rate limited API endpoints<br>
                        🌍 Real-time weather data
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
