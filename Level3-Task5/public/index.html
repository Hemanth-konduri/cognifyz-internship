<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .navbar { background: rgba(0,0,0,0.3) !important; }
        .card {
            border: none;
            border-radius: 15px;
            animation: fadeInUp 0.6s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .user-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }
        .user-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">🚀 User Management API</a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row g-4">

            <!-- Add User Form -->
            <div class="col-md-5">
                <div class="card shadow-lg p-4">
                    <h4 class="fw-bold mb-4" style="color:#667eea">Add New User</h4>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Full Name</label>
                        <input type="text" id="name" class="form-control" placeholder="Enter name" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" id="email" class="form-control" placeholder="Enter email" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Phone</label>
                        <input type="tel" id="phone" class="form-control" placeholder="Enter phone" />
                    </div>
                    <button class="btn btn-primary text-white w-100 py-2 fw-bold" onclick="addUser()">
                        Add User 🚀
                    </button>
                    <div id="formMessage" class="mt-3"></div>
                </div>
            </div>

            <!-- Users List -->
            <div class="col-md-7">
                <div class="card shadow-lg p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h4 class="fw-bold mb-0" style="color:#667eea">All Users</h4>
                        <button class="btn btn-primary text-white btn-sm" onclick="fetchUsers()">
                            🔄 Refresh
                        </button>
                    </div>
                    <div id="usersList">
                        <p class="text-muted text-center">No users yet. Add one!</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Edit User</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editId" />
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Full Name</label>
                        <input type="text" id="editName" class="form-control" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" id="editEmail" class="form-control" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Phone</label>
                        <input type="tel" id="editPhone" class="form-control" />
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary text-white" onclick="updateUser()">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API = 'http://localhost:3000/api/users';

        // Fetch all users
        async function fetchUsers() {
            const res = await fetch(API);
            const users = await res.json();
            const list = document.getElementById('usersList');

            if (users.length === 0) {
                list.innerHTML = '<p class="text-muted text-center">No users yet. Add one!</p>';
                return;
            }

            list.innerHTML = users.map(user => `
                <div class="user-card">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="fw-bold mb-1">👤 ${user.name}</h6>
                            <p class="mb-0 text-muted small">📧 ${user.email} | 📱 ${user.phone}</p>
                        </div>
                        <div class="d-flex gap-2">
                            <button class="btn btn-sm btn-warning" onclick="openEdit(${user.id}, '${user.name}', '${user.email}', '${user.phone}')">✏️</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteUser(${user.id})">🗑️</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Add user
        async function addUser() {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const msg = document.getElementById('formMessage');

            if (!name || !email || !phone) {
                msg.innerHTML = '<div class="alert alert-danger">⚠️ All fields are required</div>';
                return;
            }

            const res = await fetch(API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, phone })
            });

            if (res.ok) {
                msg.innerHTML = '<div class="alert alert-success">✅ User added successfully!</div>';
                document.getElementById('name').value = '';
                document.getElementById('email').value = '';
                document.getElementById('phone').value = '';
                fetchUsers();
                setTimeout(() => msg.innerHTML = '', 3000);
            }
        }

        // Open edit modal
        function openEdit(id, name, email, phone) {
            document.getElementById('editId').value = id;
            document.getElementById('editName').value = name;
            document.getElementById('editEmail').value = email;
            document.getElementById('editPhone').value = phone;
            new bootstrap.Modal(document.getElementById('editModal')).show();
        }

        // Update user
        async function updateUser() {
            const id = document.getElementById('editId').value;
            const name = document.getElementById('editName').value;
            const email = document.getElementById('editEmail').value;
            const phone = document.getElementById('editPhone').value;

            const res = await fetch(`${API}/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, phone })
            });

            if (res.ok) {
                bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
                fetchUsers();
            }
        }

        // Delete user
        async function deleteUser(id) {
            if (!confirm('Are you sure you want to delete this user?')) return;
            await fetch(`${API}/${id}`, { method: 'DELETE' });
            fetchUsers();
        }

        // Load users on page load
        fetchUsers();
    </script>
</body>
</html>
